<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/metpower-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>METPower - Truck Accession System</title>
    <meta name="description" content="Professional truck accession ticket management system for METpower operations">
    
    <!-- 🌙 Always dark: app uses a permanent dark navy background -->
    <script>
      (function() {
        try {
          const saved = localStorage.getItem('theme');
          // Default to dark if nothing saved
          const theme = saved || 'dark';
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#060d1f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="METpower TAS">
    <meta name="msapplication-TileColor" content="#2563eb">
    <meta name="msapplication-config" content="/browserconfig.xml">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
    
    <!-- Microsoft Tiles -->
    <!-- Commenting out Windows tiles that may not have corresponding icons -->
    <!-- <meta name="msapplication-square70x70logo" content="/icons/icon-72x72.png"> -->
    <!-- <meta name="msapplication-square150x150logo" content="/icons/icon-144x144.png"> -->
    <!-- <meta name="msapplication-square310x310logo" content="/icons/icon-384x384.png"> -->
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
              
              // Check for updates
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // New content is available, refresh to update
                      if (confirm('New version available! Refresh to update?')) {
                        window.location.reload();
                      }
                    }
                  });
                }
              });
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });

        // Listen for messages from service worker
        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data && event.data.type === 'CACHE_UPDATED') {
            console.log('Cache updated, new content available');
          }
        });
      }
      
      // PWA Install Prompt
      let deferredPrompt;
      
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // Show custom install button if needed
        const installButton = document.getElementById('install-button');
        if (installButton) {
          installButton.style.display = 'block';
          installButton.addEventListener('click', () => {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
              if (choiceResult.outcome === 'accepted') {
                console.log('User accepted the install prompt');
              }
              deferredPrompt = null;
              installButton.style.display = 'none';
            });
          });
        }
      });
      
      // Track PWA install success
      window.addEventListener('appinstalled', (event) => {
        console.log('PWA was installed successfully');
        deferredPrompt = null;
      });
      
      // Background sync for offline transactions
      if ('serviceWorker' in navigator && 'sync' in window.ServiceWorkerRegistration.prototype) {
        navigator.serviceWorker.ready.then((registration) => {
          // Register for background sync when needed
          window.syncTransactions = () => {
            return registration.sync.register('transaction-sync');
          };
        });
      }
      
      // ===== CACHE CLEARING UTILITY =====
      // In development, clear cache and reload with: window.clearCacheAndReload()
      window.clearCacheAndReload = async () => {
        try {
          // Unregister all service workers
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (let registration of registrations) {
            await registration.unregister();
            console.log('Service worker unregistered');
          }
          
          // Clear all caches
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(name => caches.delete(name)));
          console.log('All caches cleared:', cacheNames);
          
          // Clear session/local storage (optional)
          // sessionStorage.clear();
          // localStorage.clear();
          
          // Hard reload
          window.location.reload(true);
        } catch (error) {
          console.error('Failed to clear cache:', error);
        }
      };
      
      // Auto-clear cache in development on Ctrl+Shift+R
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        console.log('🔧 Development Mode: Use window.clearCacheAndReload() to clear cache, or press Ctrl+Shift+R');
        
        document.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.shiftKey && e.key === 'R') {
            e.preventDefault();
            console.log('Clearing cache and reloading...');
            window.clearCacheAndReload();
          }
        });
      }
    </script>
  </body>
</html>
